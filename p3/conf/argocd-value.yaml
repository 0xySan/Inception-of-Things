# ============================================
# ArgoCD Minimal Configuration
# ============================================

server:
  insecure: true
  service:
    type: ClusterIP
    port: 80
  extraArgs:
    - --insecure

controller:
  replicas: 1
  # Add this extra parameter to ensure the controller resyncs more frequently
  extraArgs:
    - --app-resync
    - "30" # Checks for changes every 30 seconds

repoServer:
  replicas: 1

configs:
  cm:
    url: http://argocd.localhost
    # timeout.reconciliation controls how often ArgoCD polls the Git repo
    insecure: true
    timeout.reconciliation: "15s"
  params:
    server.url: http://argocd.localhost
    server.insecure: "true"

redis:
  enabled: true
  auth:
    enabled: false
