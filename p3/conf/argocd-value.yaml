server:
  insecure: true
  service:
    type: ClusterIP
    port: 80
  extraArgs:
    - --insecure

controller:
  replicas: 1

repoServer:
  replicas: 1

configs:
  cm:
    url: http://argocd.localhost
    insecure: true
    timeout.reconciliation: 60s
  params:
    server.url: http://argocd.localhost
    server.insecure: "true"

redis:
  enabled: true
  auth:
    enabled: false
