apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: dev
  labels:
    app: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          command:
            - /bin/sh
            - -c
            - |
              cat <<'EOF' >/usr/share/nginx/html/index.html
              <!doctype html>
              <html>
              <head><title>Inception of Things</title></head>
              <body style="font-family: sans-serif; text-align: center; padding-top: 20vh;">
                <h1>Deployed by Argo CD</h1>
                <p>Namespace: dev</p>
              </body>
              </html>
              EOF
              nginx -g 'daemon off;'
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: dev
  labels:
    app: demo-app
spec:
  selector:
    app: demo-app
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP

