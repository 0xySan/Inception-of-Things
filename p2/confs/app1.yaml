apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-one
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-one
  template:
    metadata:
      labels:
        app: app-one
    spec:
      initContainers:
      - name: render-html
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          cp /template/index.html /work/index.html
          cp /template/main.css /work/main.css
          cp /template/Kubernetes.png /work/Kubernetes.png
          sed -i "s|__APP_MESSAGE__|Hello from app1.|g" /work/index.html
          sed -i "s|__POD_NAME__|${POD_NAME}|g" /work/index.html
          sed -i "s|__NODE_NAME__|${NODE_NAME}|g" /work/index.html
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: html-template
          mountPath: /template
          readOnly: true
        - name: html-work
          mountPath: /work
      containers:
      - name: app-one
        image: nginx
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-work
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-template
        hostPath:
          path: /var/www/html
          type: Directory
      - name: html-work
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: app-one
spec:
  selector:
    app: app-one
  ports:
  - port: 80
    targetPort: 80