<!DOCTYPE html>
<html>
<head>
  <title>Hello Kubernetes!</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Ubuntu:300" >
</head>
<body>
  <div class="main">
    <img src="Kubernetes.png"/>
    <div class="content">
      <div id="message">
        __APP_MESSAGE__

          </tr>

          </tr>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
